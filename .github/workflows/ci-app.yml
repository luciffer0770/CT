name: App CI

on:
  pull_request:
    paths:
      - 'CT-Tool-cursor-audit-v3-prod-c01e/app/**'
      - '.github/workflows/ci-app.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CT-Tool-cursor-audit-v3-prod-c01e/app/package-lock.json
      - name: Install
        working-directory: CT-Tool-cursor-audit-v3-prod-c01e/app
        run: npm ci
      - name: Lint
        working-directory: CT-Tool-cursor-audit-v3-prod-c01e/app
        run: npm run lint
      - name: Test
        working-directory: CT-Tool-cursor-audit-v3-prod-c01e/app
        run: npm run test
      - name: Build
        working-directory: CT-Tool-cursor-audit-v3-prod-c01e/app
        env:
          GITHUB_SHA: ${{ github.sha }}
          VITE_BASE: /
        run: npm run build
